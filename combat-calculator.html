<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Era das Espadas Quebradas — Calculador de Combate</title>
  <meta name="description" content="Calculador de combate GURPS 4e para o RPG A Era das Espadas Quebradas. Teste de Sucesso, Disputa Rápida e Calculadora de Dano.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════
       DESIGN TOKENS — Japão Feudal Dark Mode
       ═══════════════════════════════════════════ */
    :root {
      --bg-deep: #0A0A0A;
      --bg-panel: #141414;
      --bg-panel-hover: #1C1C1C;
      --bg-input: #0F0F0F;
      --border-panel: #2A2A2A;
      --border-input: #333;
      --border-focus: #8B0000;

      --red-blood: #8B0000;
      --red-accent: #C41E3A;
      --red-glow: rgba(196, 30, 58, 0.4);
      --red-failure: #DC2626;

      --gold: #D4A846;
      --gold-glow: rgba(212, 168, 70, 0.5);

      --green-success: #22C55E;
      --text-primary: #F5F0E8;
      --text-secondary: #9CA3AF;
      --text-muted: #6B7280;

      --font-display: 'Noto Serif JP', serif;
      --font-body: 'Inter', system-ui, sans-serif;

      --radius: 6px;
      --radius-lg: 10px;
      --transition: 200ms ease;
    }

    /* ═══════════════════════════════════════════
       RESET & BASE
       ═══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ═══════════════════════════════════════════
       APP LAYOUT — 100vh, zero page scroll
       ═══════════════════════════════════════════ */
    #app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      max-height: 100vh;
      gap: 0;
    }

    /* ═══════════════════════════════════════════
       HEADER
       ═══════════════════════════════════════════ */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border-panel);
    }

    .header__title {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.02em;
    }

    .header__title span {
      color: var(--red-accent);
    }

    .header__actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .tab-nav { display: flex; gap: 4px; }
    .tab-nav__link {
      font-family: var(--font-body); font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted);
      text-decoration: none; padding: 6px 12px;
      border-radius: var(--radius) var(--radius) 0 0;
      border: 1px solid transparent; transition: all var(--transition);
    }
    .tab-nav__link:hover { color: var(--text-secondary); background: rgba(255,255,255,0.03); }
    .tab-nav__link--active { color: var(--gold); border-bottom: 2px solid var(--gold); }

    /* ═══════════════════════════════════════════
       MAIN — 3-COLUMN GRID
       ═══════════════════════════════════════════ */
    .main {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border-panel);
      overflow: hidden;
      min-height: 0;
    }

    /* ═══════════════════════════════════════════
       PANELS
       ═══════════════════════════════════════════ */
    .panel {
      background: var(--bg-panel);
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      min-height: 0;
    }

    .panel__header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-panel);
    }

    .panel__icon {
      font-size: 1.2rem;
    }

    .panel__title {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }

    /* ═══════════════════════════════════════════
       FORM ELEMENTS
       ═══════════════════════════════════════════ */
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field__label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    .field__input {
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 1.25rem;
      font-weight: 600;
      padding: 10px 14px;
      text-align: center;
      transition: border-color var(--transition), box-shadow var(--transition);
      width: 100%;
      outline: none;
    }

    .field__input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--red-glow);
    }

    .field__input::placeholder {
      color: var(--text-muted);
      font-weight: 400;
      font-size: 0.9rem;
    }

    .field__input::-webkit-outer-spin-button, .field__input::-webkit-inner-spin-button { -webkit-appearance: none; appearance: none; }
    .field__input[type=number] { -moz-appearance: textfield; appearance: textfield; }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .type-selector {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }

    .type-selector input[type="radio"] {
      display: none;
    }

    .type-selector__label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 8px 4px;
      border: 1px solid var(--border-input);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--transition);
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      text-align: center;
      user-select: none;
    }

    .type-selector__label:hover {
      border-color: var(--text-secondary);
      color: var(--text-secondary);
    }

    .type-selector input[type="radio"]:checked + .type-selector__label {
      border-color: var(--red-accent);
      color: var(--red-accent);
      background: rgba(196, 30, 58, 0.08);
    }

    .type-selector__mult {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .type-selector input[type="radio"]:checked + .type-selector__label .type-selector__mult {
      color: var(--red-accent);
    }

    /* ═══════════════════════════════════════════
       BUTTONS
       ═══════════════════════════════════════════ */
    .btn {
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: var(--font-body);
      font-weight: 700;
      letter-spacing: 0.04em;
      transition: all var(--transition);
      outline: none;
      text-transform: uppercase;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--red-blood), var(--red-accent));
      color: var(--text-primary);
      font-size: 1rem;
      padding: 14px 20px;
      width: 100%;
      box-shadow: 0 2px 12px var(--red-glow);
    }

    .btn-primary:hover {
      box-shadow: 0 4px 24px var(--red-glow);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(1px);
      box-shadow: 0 1px 6px var(--red-glow);
    }

    .btn-secondary {
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      color: var(--text-secondary);
      font-size: 0.8rem;
      padding: 8px 16px;
    }

    .btn-secondary:hover {
      border-color: var(--text-secondary);
      color: var(--text-primary);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border-panel);
      color: var(--text-muted);
      font-size: 0.7rem;
      padding: 6px 12px;
    }

    .btn-ghost:hover {
      border-color: var(--red-accent);
      color: var(--red-accent);
    }

    /* ═══════════════════════════════════════════
       RESULT DISPLAY
       ═══════════════════════════════════════════ */
    .result-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 16px;
      border-radius: var(--radius-lg);
      background: var(--bg-deep);
      border: 1px solid var(--border-panel);
      min-height: 90px;
      justify-content: center;
      transition: all 400ms ease;
      position: relative;
      overflow: hidden;
    }

    .result-box__dice {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
    }

    .result-box__type {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 0.06em;
    }

    .result-box__kanji {
      font-family: var(--font-display);
      font-size: 0.75rem;
      opacity: 0.5;
    }

    .result-box__damage {
      font-size: 1.5rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .result-box__formula {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: monospace;
    }

    .result--critico {
      border-color: var(--gold);
      box-shadow: 0 0 20px var(--gold-glow);
    }
    .result--critico .result-box__type { color: var(--gold); }

    .result--sucesso { border-color: var(--green-success); }
    .result--sucesso .result-box__type { color: var(--green-success); }

    .result--falha { border-color: var(--border-panel); }
    .result--falha .result-box__type { color: var(--text-muted); }

    .result--falha-critica {
      border-color: var(--red-failure);
      box-shadow: 0 0 20px rgba(220, 38, 38, 0.3);
    }
    .result--falha-critica .result-box__type { color: var(--red-failure); }

    .result--dano .result-box__damage { color: var(--red-accent); }

    .contest-vs {
      text-align: center;
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      padding: 4px 0;
      letter-spacing: 0.15em;
    }

    .contest-result {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      align-items: stretch;
    }

    .contest-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 10px 8px;
      border-radius: var(--radius);
      background: var(--bg-deep);
      border: 1px solid var(--border-panel);
      min-height: 70px;
      justify-content: center;
      transition: all 400ms ease;
    }

    .contest-side__label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    /* ═══════════════════════════════════════════
       RESPONSIVE MOBILE
       ═══════════════════════════════════════════ */
    @media (max-width: 900px) {
      body, html { overflow: auto; min-height: 100vh; }
      #app { height: auto; min-height: 100vh; grid-template-rows: auto 1fr auto; display: block; }
      .main { grid-template-columns: 1fr; overflow-y: visible; height: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; background: transparent; }
      .header { flex-wrap: wrap; gap: 10px; }
      .header__actions { width: 100%; justify-content: space-between; border-top: 1px solid var(--border-panel); padding-top: 10px; }
      .tab-nav { margin-right: 0; width: 100%; overflow-x: auto; white-space: nowrap; flex-wrap: nowrap; border-bottom: 1px solid rgba(212,175,55,0.1); padding-bottom: 2px; }
      .tab-nav::-webkit-scrollbar { display: none; }
      .panel { min-height: fit-content; border: 1px solid var(--border-panel); border-radius: var(--radius-lg); }
    }

    .contest-side__dice {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
    }

    .contest-side__result {
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 700;
    }

    .contest-vs-divider {
      display: flex;
      align-items: center;
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 900;
      color: var(--text-muted);
      padding: 0 2px;
    }

    .contest-winner {
      text-align: center;
      font-family: var(--font-display);
      font-size: 0.9rem;
      font-weight: 700;
      padding: 6px;
      border-radius: var(--radius);
      margin-top: 4px;
    }

    .side--winner { border-color: var(--gold); box-shadow: 0 0 10px var(--gold-glow); }
    .side--winner .contest-side__result { color: var(--gold); }
    .side--loser { opacity: 0.6; }

    /* ═══════════════════════════════════════════
       HISTORY STRIP
       ═══════════════════════════════════════════ */
    .history {
      background: var(--bg-panel);
      border-top: 1px solid var(--border-panel);
      display: flex;
      flex-direction: column;
      max-height: 30vh;
      min-height: 120px;
    }

    .history__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 24px;
      border-bottom: 1px solid var(--border-panel);
      flex-shrink: 0;
    }

    .history__title {
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .history__list {
      overflow-y: auto;
      padding: 8px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-height: 0;
    }

    .history__empty {
      color: var(--text-muted);
      font-size: 0.8rem;
      text-align: center;
      padding: 16px;
      font-style: italic;
    }

    .history__entry {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 12px;
      border-radius: var(--radius);
      background: var(--bg-deep);
      font-size: 0.78rem;
      font-variant-numeric: tabular-nums;
      border-left: 3px solid var(--border-panel);
    }

    .history__entry--critico { border-left-color: var(--gold); }
    .history__entry--sucesso { border-left-color: var(--green-success); }
    .history__entry--falha { border-left-color: var(--text-muted); }
    .history__entry--falha-critica { border-left-color: var(--red-failure); }

    .history__time { color: var(--text-muted); min-width: 45px; }
    .history__action { color: var(--text-secondary); min-width: 65px; font-weight: 600; }
    .history__dice { color: var(--text-secondary); min-width: 90px; }
    .history__result-text { font-weight: 700; min-width: 110px; }
    .history__damage { color: var(--red-accent); font-weight: 600; }

    /* ═══════════════════════════════════════════
       ANIMATIONS
       ═══════════════════════════════════════════ */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-4px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }

    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 15px var(--gold-glow); }
      50% { box-shadow: 0 0 30px var(--gold-glow), 0 0 50px rgba(212, 168, 70, 0.2); }
    }

    @keyframes dice-shimmer {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .anim-shake { animation: shake 400ms ease; }
    .anim-glow { animation: glow-pulse 1.5s ease infinite; }
    .anim-rolling .result-box__dice { animation: dice-shimmer 100ms linear infinite; }

    /* ═══════════════════════════════════════════
       RESPONSIVE — < 1024px: stack vertical
       ═══════════════════════════════════════════ */
    @media (max-width: 1024px) {
      html, body { overflow: auto; }
      #app {
        grid-template-rows: auto auto auto;
        height: auto;
        min-height: 100vh;
      }
      .main {
        grid-template-columns: 1fr;
        gap: 1px;
      }
      .panel {
        padding: 16px 20px;
      }
      .history {
        max-height: none;
        min-height: 150px;
      }
    }

    @media (max-width: 480px) {
      .header {
        padding: 10px 16px;
        flex-wrap: wrap;
        gap: 8px;
      }
      .header__title { font-size: 0.95rem; }
      .panel { padding: 14px 16px; }
      .history__list { padding: 8px 16px; }
      .history__header { padding: 8px 16px; }
      .field-row { grid-template-columns: 1fr; }
      .contest-result { grid-template-columns: 1fr; gap: 4px; }
      .contest-vs-divider {
        justify-content: center;
        padding: 2px;
      }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--border-panel); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>

  
  <!-- PWA METATAGS -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0A0A0A">
  <link rel="apple-touch-icon" href="icons/app-icon-192.png">
  <link rel="icon" type="image/png" href="icons/app-icon-192.png">

<body>

<div id="app">

  <!-- ════════ HEADER ════════ -->
  <div id="daimyo-header"></div>
  <script src="js/header-loader.js"></script>

  <script src="js/weapons-data.js"></script>

  <!-- ════════ MAIN: 3 COLUMNS ════════ -->
  <main class="main">

    <!-- ── PAINEL 1: TESTE DE SUCESSO ── -->
    <section class="panel" id="panel-sucesso">
      <div class="panel__header">
        <span class="panel__icon">🎯</span>
        <h2 class="panel__title">Teste de Sucesso</h2>
      </div>

      <div class="field">
        <label class="field__label" for="nh-sucesso">Nível de Habilidade (NH)</label>
        <input class="field__input" type="number" id="nh-sucesso" min="1" max="30" placeholder="Ex: 12">
      </div>

      <button class="btn btn-primary" id="btn-rolar-sucesso">🎲 Rolar 3d6</button>

      <div class="result-box" id="result-sucesso">
        <span class="result-box__dice" id="dice-sucesso">—</span>
        <span class="result-box__type" id="type-sucesso">Aguardando...</span>
        <span class="result-box__kanji" id="kanji-sucesso"></span>
      </div>
    </section>

    <!-- ── PAINEL 2: DISPUTA RÁPIDA ── -->
    <section class="panel" id="panel-disputa">
      <div class="panel__header">
        <span class="panel__icon">⚔</span>
        <h2 class="panel__title">Disputa Rápida</h2>
      </div>

      <div class="field-row">
        <div class="field">
          <label class="field__label" for="nh-atacante">NH Atacante</label>
          <input class="field__input" type="number" id="nh-atacante" min="1" max="30" placeholder="NH">
        </div>
        <div class="field">
          <label class="field__label" for="nh-defensor">NH Defensor</label>
          <input class="field__input" type="number" id="nh-defensor" min="1" max="30" placeholder="NH">
        </div>
      </div>

      <button class="btn btn-primary" id="btn-disputa">⚔ Resolver Disputa</button>

      <div class="contest-result" id="result-disputa-box" style="display:none;">
        <div class="contest-side" id="contest-atk">
          <span class="contest-side__label">Atacante</span>
          <span class="contest-side__dice" id="dice-atk">—</span>
          <span class="contest-side__result" id="result-atk">—</span>
        </div>
        <div class="contest-vs-divider">VS</div>
        <div class="contest-side" id="contest-def">
          <span class="contest-side__label">Defensor</span>
          <span class="contest-side__dice" id="dice-def">—</span>
          <span class="contest-side__result" id="result-def">—</span>
        </div>
      </div>
      <div class="contest-winner" id="contest-winner" style="display:none;"></div>
    </section>

    <!-- ── PAINEL 3: CALCULADORA DE DANO ── -->
    <section class="panel" id="panel-dano">
      <div class="panel__header">
        <span class="panel__icon">🗡</span>
        <h2 class="panel__title">Calculadora de Dano</h2>
      </div>

      <div class="field-row">
        <div class="field">
          <label class="field__label" for="input-dano">Dano Bruto</label>
          <input class="field__input" type="number" id="input-dano" min="0" max="100" placeholder="Dano">
        </div>
        <div class="field">
          <label class="field__label" for="input-rd">RD (Resistência)</label>
          <input class="field__input" type="number" id="input-rd" min="0" max="100" placeholder="RD">
        </div>
      </div>

      <div class="field">
        <label class="field__label" for="select-attacker-calc">Atacante (do Escudo)</label>
        <select class="field__select" id="select-attacker-calc" style="width:100%; padding:8px; border-radius:var(--radius); background:rgba(0,0,0,0.3); color:var(--text-primary); border:1px solid var(--border-panel); font-size:0.8rem">
          <option value="">— Selecionar Combatente —</option>
        </select>
      </div>

      <div class="field">
        <label class="field__label">Tipo de Dano</label>
        <div class="type-selector">
          <input type="radio" name="tipo-dano" id="tipo-cr" value="cr" checked>
          <label class="type-selector__label" for="tipo-cr">
            <span class="type-selector__mult">×1</span>
            Contusão
          </label>

          <input type="radio" name="tipo-dano" id="tipo-cut" value="cut">
          <label class="type-selector__label" for="tipo-cut">
            <span class="type-selector__mult">×1.5</span>
            Corte
          </label>

          <input type="radio" name="tipo-dano" id="tipo-imp" value="imp">
          <label class="type-selector__label" for="tipo-imp">
            <span class="type-selector__mult">×2</span>
            Perfuração
          </label>
        </div>
      </div>
      
      <div class="field" style="margin-top: 15px;">
        <label class="field__label" for="select-hit-loc">Local de Acerto</label>
        <select class="field__select" id="select-hit-loc" style="width:100%; padding:8px; border-radius:var(--radius); background:rgba(0,0,0,0.3); color:var(--text-primary); border:1px solid var(--border-panel); font-size:0.8rem">
          <option value="torso">Tronco (×1)</option>
          <option value="skull">Crânio (RD+2, ×4)</option>
          <option value="face">Rosto / Pescoço (Corte ×2 / Perf ×1.5)</option>
          <option value="vitals">Vitais (1/2 ou Perfuração ×3)</option>
          <option value="limbs">Membros (Teto de Dano manual)</option>
        </select>
      </div>

      <button class="btn btn-primary" id="btn-calcular-dano">🗡 Calcular Dano</button>

      <div class="result-box result--dano" id="result-dano" style="display:none;">
        <span class="result-box__formula" id="formula-dano"></span>
        <span class="result-box__damage" id="damage-value">0</span>
        <span class="result-box__formula">pontos de dano</span>
      </div>
    </section>

  </main>

  <!-- ════════ COMBAT HISTORY ════════ -->
  <section class="history" id="history-section">
    <div class="history__header">
      <h3 class="history__title">📜 Histórico de Combate</h3>
      <button class="btn btn-ghost" id="btn-limpar-historico">Limpar</button>
    </div>
    <div class="history__list" id="history-list">
      <p class="history__empty" id="history-empty">Nenhuma ação registrada. Role os dados para começar.</p>
    </div>
  </section>

</div>

<script>
/* ═══════════════════════════════════════════════════════
   GURPS 4e ENGINE — Lógica pura, sem dependência de DOM
   ═══════════════════════════════════════════════════════ */

const ResultType = Object.freeze({
  SUCESSO_CRITICO: 'SUCESSO_CRITICO',
  SUCESSO: 'SUCESSO',
  FALHA: 'FALHA',
  FALHA_CRITICA: 'FALHA_CRITICA'
});

const MULTIPLIERS = Object.freeze({ cr: 1, cut: 1.5, imp: 2 });
const TYPE_LABELS = Object.freeze({ cr: 'Contusão', cut: 'Corte', imp: 'Perfuração' });
const RESULT_LABELS = Object.freeze({
  SUCESSO_CRITICO: 'Sucesso Crítico!',
  SUCESSO: 'Sucesso',
  FALHA: 'Falha',
  FALHA_CRITICA: 'Falha Crítica!'
});
const RESULT_KANJI = Object.freeze({
  SUCESSO_CRITICO: '成功',
  SUCESSO: '',
  FALHA: '',
  FALHA_CRITICA: '失敗'
});

function roll3d6() {
  const dice = [
    Math.floor(Math.random() * 6) + 1,
    Math.floor(Math.random() * 6) + 1,
    Math.floor(Math.random() * 6) + 1
  ];
  return { dice, total: dice[0] + dice[1] + dice[2] };
}

function classifyResult(total, nh) {
  if (total === 3 || total === 4) return ResultType.SUCESSO_CRITICO;
  if (total === 5 && nh >= 15) return ResultType.SUCESSO_CRITICO;
  if (total === 6 && nh >= 16) return ResultType.SUCESSO_CRITICO;
  if (total === 18) return ResultType.FALHA_CRITICA;
  if (total === 17 && nh <= 15) return ResultType.FALHA_CRITICA;
  if (total <= nh) return ResultType.SUCESSO;
  return ResultType.FALHA;
}

function calculateDamage(rawDamage, dr, damageType) {
  const penetration = Math.max(rawDamage - dr, 0);
  const multiplier = MULTIPLIERS[damageType] || 1;
  return Math.floor(penetration * multiplier);
}

function resolveContest(nh1, nh2) {
  const roll1 = roll3d6();
  const roll2 = roll3d6();
  const result1 = classifyResult(roll1.total, nh1);
  const result2 = classifyResult(roll2.total, nh2);
  const margin1 = nh1 - roll1.total;
  const margin2 = nh2 - roll2.total;

  let winner;
  if (margin1 > margin2) winner = 'ATACANTE';
  else if (margin2 > margin1) winner = 'DEFENSOR';
  else winner = 'EMPATE';

  return {
    attacker: { roll: roll1, result: result1, margin: margin1 },
    defender: { roll: roll2, result: result2, margin: margin2 },
    winner
  };
}

/* ═══════════════════════════════════════════════════════
   HISTORY MANAGER — localStorage persistence
   ═══════════════════════════════════════════════════════ */
const HISTORY_KEY = 'espadas_quebradas_history';
const MAX_HISTORY = 50;

function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
  } catch { return []; }
}

function saveHistory(entries) {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(entries.slice(0, MAX_HISTORY)));
}

function addHistoryEntry(entry) {
  const entries = loadHistory();
  entries.unshift({ ...entry, time: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) });
  saveHistory(entries);
  renderHistory();
}

let _clearTimeout;
function clearHistory(e) {
  const btn = e.target;
  if (btn.dataset.confirming === 'true') {
    localStorage.removeItem(HISTORY_KEY);
    renderHistory();
    btn.dataset.confirming = 'false';
    btn.textContent = 'Limpar';
    btn.style.borderColor = '';
    btn.style.color = '';
    clearTimeout(_clearTimeout);
  } else {
    btn.dataset.confirming = 'true';
    btn.textContent = 'Confirma?';
    btn.style.borderColor = 'var(--red-accent)';
    btn.style.color = 'var(--red-accent)';
    _clearTimeout = setTimeout(() => {
      btn.dataset.confirming = 'false';
      btn.textContent = 'Limpar';
      btn.style.borderColor = '';
      btn.style.color = '';
    }, 3000);
  }
}

function getResultCssClass(resultType) {
  switch (resultType) {
    case ResultType.SUCESSO_CRITICO: return 'critico';
    case ResultType.SUCESSO: return 'sucesso';
    case ResultType.FALHA: return 'falha';
    case ResultType.FALHA_CRITICA: return 'falha-critica';
    default: return 'falha';
  }
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const entries = loadHistory();

  if (entries.length === 0) {
    list.innerHTML = '<p class="history__empty">Nenhuma ação registrada. Role os dados para começar.</p>';
    return;
  }

  list.innerHTML = entries.map(e => {
    const cls = e.resultClass || 'falha';
    const dmgText = e.damage !== undefined && e.damage !== null ? `<span class="history__damage">${e.damage} dano</span>` : '';
    return `<div class="history__entry history__entry--${cls}">
      <span class="history__time">${e.time}</span>
      <span class="history__action">${e.action}</span>
      <span class="history__dice">${e.diceText}</span>
      <span class="history__result-text" style="color:${e.color}">${e.resultText}</span>
      ${dmgText}
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════════════════════
   UI HELPERS
   ═══════════════════════════════════════════════════════ */

function getResultColor(resultType) {
  switch (resultType) {
    case ResultType.SUCESSO_CRITICO: return '#D4A846';
    case ResultType.SUCESSO: return '#22C55E';
    case ResultType.FALHA: return '#9CA3AF';
    case ResultType.FALHA_CRITICA: return '#DC2626';
    default: return '#9CA3AF';
  }
}

function animateDice(container, callback) {
  container.classList.add('anim-rolling');
  const diceEl = container.querySelector('[id^="dice-"]') || container.querySelector('.result-box__dice');

  let count = 0;
  const interval = setInterval(() => {
    const fake = [
      Math.floor(Math.random() * 6) + 1,
      Math.floor(Math.random() * 6) + 1,
      Math.floor(Math.random() * 6) + 1
    ];
    if (diceEl) diceEl.textContent = `[ ${fake[0]} + ${fake[1]} + ${fake[2]} = ${fake[0]+fake[1]+fake[2]} ]`;
    count++;
    if (count >= 8) {
      clearInterval(interval);
      container.classList.remove('anim-rolling');
      callback();
    }
  }, 70);
}

/* ═══════════════════════════════════════════════════════
   EVENT HANDLERS
   ═══════════════════════════════════════════════════════ */

// ── Teste de Sucesso ──
document.getElementById('btn-rolar-sucesso').addEventListener('click', function() {
  const nhInput = document.getElementById('nh-sucesso');
  const nh = parseInt(nhInput.value);
  if (isNaN(nh) || nh < 1) { nhInput.focus(); return; }

  const box = document.getElementById('result-sucesso');
  const diceEl = document.getElementById('dice-sucesso');
  const typeEl = document.getElementById('type-sucesso');
  const kanjiEl = document.getElementById('kanji-sucesso');

  box.className = 'result-box';

  animateDice(box, () => {
    const { dice, total } = roll3d6();
    const result = classifyResult(total, nh);

    diceEl.textContent = `[ ${dice[0]} + ${dice[1]} + ${dice[2]} = ${total} ]`;
    typeEl.textContent = RESULT_LABELS[result];
    kanjiEl.textContent = RESULT_KANJI[result];

    const cssClass = getResultCssClass(result);
    box.className = `result-box result--${cssClass}`;

    if (result === ResultType.SUCESSO_CRITICO) box.classList.add('anim-glow');
    if (result === ResultType.FALHA_CRITICA) box.classList.add('anim-shake');

    addHistoryEntry({
      action: 'Sucesso',
      diceText: `3d6 = [${dice.join(', ')}] = ${total}`,
      resultText: RESULT_LABELS[result],
      resultClass: cssClass,
      color: getResultColor(result)
    });
  });
});

// ── Disputa Rápida ──
document.getElementById('btn-disputa').addEventListener('click', function() {
  const nh1Input = document.getElementById('nh-atacante');
  const nh2Input = document.getElementById('nh-defensor');
  const nh1 = parseInt(nh1Input.value);
  const nh2 = parseInt(nh2Input.value);
  if (isNaN(nh1) || nh1 < 1) { nh1Input.focus(); return; }
  if (isNaN(nh2) || nh2 < 1) { nh2Input.focus(); return; }

  const resultBox = document.getElementById('result-disputa-box');
  const winnerBox = document.getElementById('contest-winner');
  resultBox.style.display = 'grid';
  winnerBox.style.display = 'block';

  const contest = resolveContest(nh1, nh2);
  const { attacker: atk, defender: def } = contest;

  const atkSide = document.getElementById('contest-atk');
  document.getElementById('dice-atk').textContent = `[${atk.roll.dice.join('+')}] = ${atk.roll.total}`;
  document.getElementById('result-atk').textContent = `${RESULT_LABELS[atk.result]} (${atk.margin >= 0 ? '+' : ''}${atk.margin})`;
  document.getElementById('result-atk').style.color = getResultColor(atk.result);

  const defSide = document.getElementById('contest-def');
  document.getElementById('dice-def').textContent = `[${def.roll.dice.join('+')}] = ${def.roll.total}`;
  document.getElementById('result-def').textContent = `${RESULT_LABELS[def.result]} (${def.margin >= 0 ? '+' : ''}${def.margin})`;
  document.getElementById('result-def').style.color = getResultColor(def.result);

  atkSide.className = 'contest-side';
  defSide.className = 'contest-side';

  if (contest.winner === 'ATACANTE') {
    atkSide.classList.add('side--winner');
    defSide.classList.add('side--loser');
    winnerBox.textContent = '⚔ Atacante vence!';
    winnerBox.style.color = '#D4A846';
  } else if (contest.winner === 'DEFENSOR') {
    defSide.classList.add('side--winner');
    atkSide.classList.add('side--loser');
    winnerBox.textContent = '🛡 Defensor vence!';
    winnerBox.style.color = '#D4A846';
  } else {
    winnerBox.textContent = '⚖ Empate!';
    winnerBox.style.color = '#9CA3AF';
  }

  addHistoryEntry({
    action: 'Disputa',
    diceText: `Atk [${atk.roll.dice.join('+')}]=${atk.roll.total} vs Def [${def.roll.dice.join('+')}]=${def.roll.total}`,
    resultText: contest.winner === 'EMPATE' ? 'Empate' : `${contest.winner === 'ATACANTE' ? 'Atacante' : 'Defensor'} vence`,
    resultClass: contest.winner === 'EMPATE' ? 'falha' : 'sucesso',
    color: contest.winner === 'EMPATE' ? '#9CA3AF' : '#D4A846'
  });
});

// ── Calculadora de Dano ──
document.getElementById('btn-calcular-dano').addEventListener('click', function() {
  const danoInput = document.getElementById('input-dano');
  const rdInput = document.getElementById('input-rd');
  const rawDamage = parseInt(danoInput.value);
  const drBase = parseInt(rdInput.value) || 0;
  if (isNaN(rawDamage) || rawDamage < 0) { danoInput.focus(); return; }
  
  const damageType = document.querySelector('input[name="tipo-dano"]:checked').value;
  const hitLoc = document.getElementById('select-hit-loc').value;
  
  let drEff = drBase;
  if (hitLoc === 'skull') drEff = drBase + 2;

  let penetrating = Math.max(rawDamage - drEff, 0);
  const multiplierOptions = { 'cr': 1, 'cut': 1.5, 'imp': 2, 'pi-': 0.5 };
  let multEff = multiplierOptions[damageType] || 1;
  let finalDamage = 0;
  let formulaStr = '';

  if (penetrating > 0) {
    if (hitLoc === 'skull') {
      let afterType = Math.floor(penetrating * multEff);
      finalDamage = afterType * 4;
      formulaStr = `floor((${rawDamage}-${drEff}) × ${multEff}) × 4 = floor(${penetrating} × ${multEff}) × 4 = ${finalDamage}`;
    } else {
      if (hitLoc === 'face') {
        if (damageType === 'cut') multEff = 2;
        if (damageType === 'imp' || damageType === 'pi-') multEff = 1.5;
      } else if (hitLoc === 'vitals' && damageType === 'imp') {
        multEff = 3;
      }
      
      finalDamage = Math.floor(penetrating * multEff);
      formulaStr = `floor((${rawDamage}-${drEff}) × ${multEff}) = floor(${penetrating} × ${multEff}) = ${finalDamage}`;
      if (hitLoc === 'limbs') formulaStr += " (Sem Limite Teto)";
    }
  } else {
    formulaStr = `(${rawDamage} - ${drEff}) = 0`;
  }

  const box = document.getElementById('result-dano');
  box.style.display = 'flex';
  document.getElementById('formula-dano').textContent = formulaStr;
  document.getElementById('damage-value').textContent = finalDamage;

  addHistoryEntry({
    action: 'Dano',
    diceText: `${rawDamage} - ${drBase} RD × ${multEff} (${hitLoc === 'skull' ? 'Crânio' : 'Tronco'})`,
    resultText: `${finalDamage} pts dano`,
    resultClass: finalDamage > 0 ? 'sucesso' : 'falha',
    color: finalDamage > 0 ? '#C41E3A' : '#9CA3AF',
    damage: finalDamage
  });
});

// ── Reset ──
document.getElementById('btn-reset').addEventListener('click', function() {
  document.querySelectorAll('.field__input').forEach(input => { input.value = ''; });
  document.getElementById('tipo-cr').checked = true;

  const successBox = document.getElementById('result-sucesso');
  successBox.className = 'result-box';
  document.getElementById('dice-sucesso').textContent = '—';
  document.getElementById('type-sucesso').textContent = 'Aguardando...';
  document.getElementById('kanji-sucesso').textContent = '';

  document.getElementById('result-disputa-box').style.display = 'none';
  document.getElementById('contest-winner').style.display = 'none';
  document.getElementById('result-dano').style.display = 'none';
});

// ── Clear History ──
document.getElementById('btn-limpar-historico').addEventListener('click', clearHistory);

// ── State Sync ──
const STATE_KEY = 'daimyoShieldState';
let appState = { combatants: [] };

function loadAppState() {
    try {
        const saved = localStorage.getItem(STATE_KEY);
        if (saved) appState = JSON.parse(saved);
        updateAttackerSelect();
    } catch (e) { console.error("Sync error", e); }
}

function updateAttackerSelect() {
    const sel = document.getElementById('select-attacker-calc');
    const current = sel.value;
    sel.innerHTML = '<option value="">— Selecionar Combatente —</option>' + 
        appState.combatants.map(c => `<option value="${c.id}">${c.name} (ST ${c.st})</option>`).join('');
    if (current) sel.value = current;
}

document.getElementById('btn-sync-state').addEventListener('click', loadAppState);

document.getElementById('select-attacker-calc').addEventListener('change', function() {
    const combatant = appState.combatants.find(c => c.id === this.value);
    if (!combatant) return;
    
    // Auto-fill RD if we can find weapon stats? No, RD is for target.
    // We fill the "Attacker" stats if we had a more complex calculator, 
    // but for now let's just show a hint.
    if (combatant.equippedWeapon) {
        const wp = findWeapon(combatant.equippedWeapon);
        if (wp) {
            alert(`Atacante equipado com: ${wp.nome}\nDano: ${wp.dano}\nUse como base para o Dano Bruto.`);
        }
    }
});

// ── Init ──
loadAppState();
renderHistory();
</script>
</body>
