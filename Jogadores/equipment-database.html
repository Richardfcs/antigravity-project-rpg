<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escudo do Daimyo — Arsenal de Equipamentos</title>
  <meta name="description"
    content="Banco de dados de consulta rápida para Armas, Armaduras e Equipamentos do RPG GURPS 4e — A Era das Espadas Quebradas.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════
       DESIGN TOKENS — Japão Feudal Dark Mode
       ═══════════════════════════════════════════ */
    :root {
      --bg-deep: #0A0A0A;
      --bg-panel: #111111;
      --bg-card: #161616;
      --bg-card-hover: #1C1C1C;
      --bg-input: #0F0F0F;
      --border-panel: #2A2A2A;
      --border-input: #333;
      --border-focus: #8B0000;

      --red-blood: #8B0000;
      --red-accent: #C41E3A;
      --red-glow: rgba(196, 30, 58, 0.4);
      --red-failure: #DC2626;

      --gold: #D4A846;
      --gold-glow: rgba(212, 168, 70, 0.5);

      --green-success: #22C55E;
      --blue-info: #3B82F6;
      --blue-steel: #60A5FA;
      --orange-warn: #F59E0B;
      --teal: #2DD4BF;
      --emerald: #10B981;
      --silver: #94A3B8;

      --text-primary: #F5F0E8;
      --text-secondary: #9CA3AF;
      --text-muted: #6B7280;

      --font-display: 'Noto Serif JP', serif;
      --font-body: 'Inter', system-ui, sans-serif;

      --radius: 6px;
      --radius-lg: 10px;
      --transition: 200ms ease;
    }

    /* ═══════════════════════════════════════════
       RESET & BASE
       ═══════════════════════════════════════════ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
    }

    body {
      min-height: 100%;
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ═══════════════════════════════════════════
       HEADER + TAB NAV
       ═══════════════════════════════════════════ */
    #daimyo-header {
      position: sticky;
      top: 0;
      z-index: 110;
      background: var(--bg-panel);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      /* background: var(--bg-panel); Removed to avoid redundancy with #daimyo-header */
    }

    .header__brand {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.02em;
      text-decoration: none;
    }

    .header__brand span {
      color: var(--red-accent);
    }

    .header__brand:hover {
      opacity: 0.9;
    }

    .tab-nav {
      display: flex;
      gap: 4px;
    }

    .tab-nav__link {
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      transition: all var(--transition);
    }

    .tab-nav__link:hover {
      color: var(--text-secondary);
      background: rgba(255, 255, 255, 0.03);
    }

    .tab-nav__link--active {
      color: var(--gold);
      border-bottom: 2px solid var(--gold);
      border-radius: var(--radius) var(--radius) 0 0;
    }

    /* BUTTONS */
    .btn-ghost {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      text-decoration: none;
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      border-color: var(--border-panel);
    }

    /* ═══════════════════════════════════════════
       SEARCH AREA
       ═══════════════════════════════════════════ */
    .search-area {
      top: 64px;
      /* Altura do new-header no desktop */
      z-index: 90;
      background: var(--bg-deep);
      padding: 12px 24px 10px;
      border-bottom: 1px solid var(--border-panel);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.6);
    }


    .search-bar {
      position: relative;
      margin-bottom: 14px;
    }

    .search-bar__icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-bar__input {
      width: 100%;
      height: 56px;
      background: var(--bg-panel);
      border: 1px solid var(--border-input);
      border-radius: var(--radius-lg);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 1.1rem;
      font-weight: 500;
      padding: 0 48px 0 48px;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .search-bar__input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    .search-bar__input::placeholder {
      color: var(--text-muted);
      font-weight: 400;
      font-style: italic;
    }

    .search-bar__clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius);
      transition: all var(--transition);
      display: none;
    }

    .search-bar__clear:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.06);
    }

    .search-bar__clear.visible {
      display: block;
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-pill {
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      border-radius: 20px;
      padding: 6px 16px;
      cursor: pointer;
      transition: all var(--transition);
      user-select: none;
    }

    .filter-pill:hover {
      border-color: var(--text-secondary);
      color: var(--text-secondary);
    }

    .filter-pill--active {
      color: var(--gold);
      border-color: var(--gold);
      background: rgba(212, 168, 70, 0.08);
    }

    .filter-counter {
      margin-left: auto;
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    /* ═══════════════════════════════════════════
       CONTENT AREA
       ═══════════════════════════════════════════ */
    .content {
      padding: 16px 24px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 0 10px;
      border-bottom: 1px solid var(--border-panel);
      margin-bottom: 12px;
    }

    .section-header__icon {
      font-size: 1.1rem;
    }

    .section-header__title {
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
    }

    .section-header__count {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }

    /* ═══════════════════════════════════════════
       ITEM CARDS
       ═══════════════════════════════════════════ */
    .item-card {
      background: var(--bg-card);
      border: 1px solid var(--border-panel);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: all var(--transition);
      cursor: default;
    }

    .item-card:hover {
      background: var(--bg-card-hover);
      border-color: #3A3A3A;
      transform: translateY(-1px);
    }

    .item-card--hidden {
      display: none;
    }

    .item-card__top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .item-tag {
      font-size: 0.58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 3px;
      white-space: nowrap;
    }

    /* Tag colors by weapon subtype */
    .item-tag--lamina {
      background: rgba(196, 30, 58, 0.12);
      color: var(--red-accent);
    }

    .item-tag--haste {
      background: rgba(96, 165, 250, 0.12);
      color: var(--blue-steel);
    }

    .item-tag--esmag {
      background: rgba(245, 158, 11, 0.12);
      color: var(--orange-warn);
    }

    .item-tag--arremesso {
      background: rgba(45, 212, 191, 0.12);
      color: var(--teal);
    }

    .item-tag--especial {
      background: rgba(212, 168, 70, 0.12);
      color: var(--gold);
    }

    .item-tag--bruta {
      background: rgba(245, 158, 11, 0.12);
      color: var(--orange-warn);
    }

    .item-tag--armadura {
      background: rgba(148, 163, 184, 0.10);
      color: var(--silver);
    }

    .item-tag--ninja {
      background: rgba(34, 197, 94, 0.10);
      color: var(--green-success);
    }

    .item-tag--oculto {
      background: rgba(16, 185, 129, 0.15);
      color: var(--emerald);
    }

    .item-tag--mundano {
      background: rgba(148, 163, 184, 0.08);
      color: var(--text-secondary);
    }

    .item-tag--viagem {
      background: rgba(161, 98, 7, 0.15);
      color: #EAB308;
    }

    .item-tag--medicina {
      background: rgba(225, 29, 72, 0.12);
      color: #FB7185;
    }

    .item-tag--cultura {
      background: rgba(168, 85, 247, 0.15);
      color: #C084FC;
    }

    .item-tag--montaria {
      background: rgba(120, 113, 108, 0.15);
      color: #A8A29E;
    }

    .item-tag--alquimia {
      background: rgba(14, 165, 233, 0.15);
      color: #38BDF8;
    }

    /* REFERENCE TABLES CSS */
    .reference-table-wrap {
      width: 100%;
      overflow-x: auto;
      margin-bottom: 24px;
      background: var(--bg-card);
      border: 1px solid var(--border-panel);
      border-radius: var(--radius-lg);
    }

    .reference-table {
      width: 100%;
      min-width: 600px;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .reference-table th {
      text-align: left;
      padding: 12px 16px;
      font-weight: 700;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border-panel);
      background: rgba(0, 0, 0, 0.3);
    }

    .reference-table td {
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      color: var(--text-secondary);
    }

    .reference-table td:first-child {
      color: var(--text-primary);
      font-weight: 600;
    }

    .reference-table tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .item-card__name {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.01em;
    }

    .item-card__stats {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .stat-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: var(--radius);
      background: var(--bg-deep);
      border: 1px solid var(--border-panel);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .stat-badge__label {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-right: 2px;
    }

    .stat-badge--dano {
      border-color: rgba(196, 30, 58, 0.3);
    }

    .stat-badge--dano .stat-badge__value {
      color: var(--red-accent);
    }

    .stat-badge--rd {
      border-color: rgba(148, 163, 184, 0.3);
    }

    .stat-badge--rd .stat-badge__value {
      color: var(--silver);
      font-size: 1rem;
      font-weight: 700;
    }

    .stat-badge--peso {
      border-color: rgba(107, 114, 128, 0.3);
    }

    .stat-badge--efeito {
      border-color: rgba(16, 185, 129, 0.2);
      flex-basis: 100%;
      white-space: normal;
      font-size: 0.75rem;
      line-height: 1.4;
      color: var(--text-secondary);
    }

    .stat-badge--efeito .stat-badge__value {
      color: var(--text-primary);
    }

    .stat-badge--unbalanced {
      border-color: rgba(245, 158, 11, 0.4);
      color: var(--orange-warn);
    }

    .item-card__meta {
      display: flex;
      gap: 12px;
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .item-card__meta span {
      white-space: nowrap;
    }

    .item-card__notes {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-style: italic;
      line-height: 1.35;
      padding-top: 4px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    /* ═══════════════════════════════════════════
       EMPTY STATE
       ═══════════════════════════════════════════ */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 60px 20px;
      text-align: center;
    }

    .empty-state.visible {
      display: flex;
    }

    .empty-state__icon {
      font-size: 2.5rem;
      opacity: 0.25;
    }

    .empty-state__text {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .empty-state__hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      opacity: 0.7;
    }

    /* ═══════════════════════════════════════════
       ANIMATIONS
       ═══════════════════════════════════════════ */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .anim-fade {
      animation: fadeIn 250ms ease;
    }

    /* ═══════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════ */
    @media (max-width: 768px) {
      .header {
        padding: 10px 16px;
        flex-wrap: wrap;
        gap: 8px;
      }

      .header__brand {
        font-size: 0.95rem;
        width: 100%;
        text-align: center;
      }

      .tab-nav {
        margin-right: 0;
        width: 100%;
        overflow-x: auto;
        white-space: nowrap;
        flex-wrap: nowrap;
        border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        padding-bottom: 2px;
      }

      .tab-nav::-webkit-scrollbar {
        display: none;
      }

      .tab-nav__link {
        font-size: 0.65rem;
        padding: 6px 10px;
      }

      .search-area {
        top: 56px;
        padding: 10px 16px;
      }

      .search-bar__input {
        height: 48px;
        font-size: 1rem;
      }


      .content {
        padding: 12px 16px 32px;
      }

      .card-grid {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .filter-pill {
        font-size: 0.65rem;
        padding: 5px 12px;
      }
    }

    @media (max-width: 480px) {
      .tab-nav__link {
        font-size: 0.6rem;
        padding: 5px 8px;
        letter-spacing: 0.03em;
      }

      .item-card {
        padding: 12px 14px;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-deep);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-panel);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }
  </style>


  <link rel="icon" type="image/png" href="icons/app-icon-192.png">
  <link rel="icon" href="icons/app-icon-192.png">

  <!-- CORE INFRASTRUCTURE (Explicit Loading) -->
  <script src="js/daimyo-db.js"></script>
  <script src="js/character-manager.js"></script>
  <script src="js/theme-manager.js"></script>
  <script src="js/log-manager.js"></script>
  <script src="js/daimyo-seal.js"></script>
  <script src="js/header-player.js"></script>
  <script>
    if (window.DaimyoDB) {
      window.DaimyoDB.init().then(() => {
        window.DaimyoDB.migrateFromLocalStorage();
        console.log("⛩️ Porta do Daimyo: Banco de dados e migrações ativos.");
      }).catch(err => console.error("Falha na inicialização do Cofre:", err));
    }
  </script>
</head>

<body>

  <!-- ════════ HEADER + TAB NAV ════════ -->
  <div id="daimyo-header"></div>

  <!-- ════════ SEARCH + FILTERS ════════ -->
  <div class="search-area">
    <div class="search-bar">
      <span class="search-bar__icon">🔍</span>
      <input type="text" class="search-bar__input" id="search-input" placeholder="Buscar Katana, Ofuda, O-Yoroi..."
        aria-label="Buscar equipamentos e armas" autofocus autocomplete="off">
      <button class="search-bar__clear" id="search-clear" title="Limpar busca">✕</button>
    </div>
    <div class="filter-row">
      <button class="filter-pill filter-pill--active" data-filter="todos" id="filter-todos">Todos</button>
      <button class="filter-pill" data-filter="arma" id="filter-arma">⚔ Armas</button>
      <button class="filter-pill" data-filter="armadura" id="filter-armadura">🛡 Armaduras</button>
      <button class="filter-pill" data-filter="equipamento" id="filter-equipamento">📦 Equipamentos</button>
      <button class="filter-pill" data-filter="regra" id="filter-regra">📚 Regras & Tabelas</button>
      <span class="filter-counter" id="filter-counter">55 itens</span>
    </div>
  </div>

  <!-- ════════ CONTENT ════════ -->
  <main class="content" id="content">

    <!-- ARMAS SECTION -->
    <div class="section-header" id="section-armas" data-section="arma">
      <span class="section-header__icon">⚔</span>
      <h2 class="section-header__title">Armas</h2>
      <span class="section-header__count" id="count-armas"></span>
    </div>
    <div class="card-grid" id="grid-armas"></div>

    <!-- ARMADURAS SECTION -->
    <div class="section-header" id="section-armaduras" data-section="armadura">
      <span class="section-header__icon">🛡</span>
      <h2 class="section-header__title">Armaduras</h2>
      <span class="section-header__count" id="count-armaduras"></span>
    </div>
    <div class="card-grid" id="grid-armaduras"></div>

    <!-- EQUIPAMENTOS SECTION -->
    <div class="section-header" id="section-equipamentos" data-section="equipamento">
      <span class="section-header__icon">📦</span>
      <h2 class="section-header__title">Equipamentos & Ocultismo</h2>
      <span class="section-header__count" id="count-equipamentos"></span>
    </div>
    <div class="card-grid" id="grid-equipamentos"></div>

    <!-- REGRAS SECTION -->
    <div class="section-header" id="section-regras" data-section="regra">
      <span class="section-header__icon">📚</span>
      <h2 class="section-header__title">Regras Opcionais & Referências</h2>
    </div>
    <div id="grid-regras" data-section="regra">
      <!-- Tabelas vão ser geradas aqui -->
    </div>

    <!-- EMPTY STATE -->
    <div class="empty-state" id="empty-state">
      <span class="empty-state__icon">刀</span>
      <p class="empty-state__text">Nenhum item encontrado.</p>
      <p class="empty-state__hint">Tente outro termo ou mude o filtro de categoria.</p>
    </div>

  </main>

  <script src="js/weapons-data.js"></script>
  <script>


    /* ═══════════════════════════════════════════════════════
       RENDER ENGINE
       ═══════════════════════════════════════════════════════ */

    const TIPO_TAG_MAP = {
      'Lâmina': { css: 'lamina', label: '⚔ Lâmina' },
      'Haste': { css: 'haste', label: '⚔ Haste' },
      'Esmagamento': { css: 'esmag', label: '⚔ Esmagamento' },
      'Arremesso': { css: 'arremesso', label: '🏹 Arremesso' },
      'Arco': { css: 'arremesso', label: '🏹 Arco' },
      'Especialista': { css: 'especial', label: '⚔ Especialista' },
      'Força Bruta': { css: 'bruta', label: '⚔ Força Bruta' }
    };

    const GEAR_TAG_MAP = {
      'ninja': { css: 'ninja', label: '🥷 Ninja' },
      'oculto': { css: 'oculto', label: '✦ Ocultismo' },
      'viagem': { css: 'viagem', label: '🎒 Viagem' },
      'medicina': { css: 'medicina', label: '💊 Medicina' },
      'cultura': { css: 'cultura', label: '🎭 Cultura' },
      'montaria': { css: 'montaria', label: '🐎 Montaria' },
      'alquimia': { css: 'alquimia', label: '🧪 Alquimia' },
      'mundano': { css: 'mundano', label: '📦 Geral' }
    };

    function normalize(str) {
      return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^\w\s]/g, ' ');
    }

    function buildSearchText(obj, category) {
      const parts = [obj.nome, obj.notas || ''];
      if (category === 'arma') parts.push(obj.tipo, obj.dano);
      if (category === 'armadura') parts.push(obj.local);
      if (category === 'equipamento') parts.push(obj.efeito, obj.subtipo);
      return normalize(parts.join(' '));
    }

    function isUnbalanced(aparar) {
      return aparar && aparar.includes('U');
    }

    function renderWeaponCard(w) {
      const tag = TIPO_TAG_MAP[w.tipo] || { css: 'especial', label: w.tipo };
      const unbalanced = isUnbalanced(w.aparar);
      const apararDisplay = unbalanced
        ? `<span class="stat-badge stat-badge--unbalanced"><span class="stat-badge__label">AP</span> <span class="stat-badge__value">${w.aparar} ⚠</span></span>`
        : `<span class="stat-badge"><span class="stat-badge__label">AP</span> <span class="stat-badge__value">${w.aparar}</span></span>`;

      return `<div class="item-card anim-fade" data-category="arma" data-search="${buildSearchText(w, 'arma')}">
    <div class="item-card__top">
      <span class="item-tag item-tag--${tag.css}">${tag.label}</span>
    </div>
    <div class="item-card__name">${w.nome}</div>
    <div class="item-card__stats">
      <span class="stat-badge stat-badge--dano"><span class="stat-badge__label">Dano</span> <span class="stat-badge__value">${w.dano}</span></span>
      ${apararDisplay}
    </div>
    <div class="item-card__meta">
      <span>Alc: ${w.alcance}</span>
      <span>ST: ${w.forca}</span>
      <span>${w.peso}</span>
      <span style="color:var(--gold)">${w.custo}</span>
    </div>
    ${w.notas ? `<div class="item-card__notes">▸ ${w.notas}</div>` : ''}
  </div>`;
    }

    function renderArmorCard(a) {
      return `<div class="item-card anim-fade" data-category="armadura" data-search="${buildSearchText(a, 'armadura')}">
    <div class="item-card__top">
      <span class="item-tag item-tag--armadura">🛡 Armadura</span>
    </div>
    <div class="item-card__name">${a.nome}</div>
    <div class="item-card__stats">
      <span class="stat-badge stat-badge--rd"><span class="stat-badge__label">RD</span> <span class="stat-badge__value">${a.rd}</span></span>
      <span class="stat-badge stat-badge--peso"><span class="stat-badge__label">Peso</span> <span class="stat-badge__value">${a.peso}</span></span>
    </div>
    <div class="item-card__meta">
      <span>Local: ${a.local}</span>
      <span style="color:var(--gold)">${a.custo}</span>
    </div>
    ${a.notas ? `<div class="item-card__notes">▸ ${a.notas}</div>` : ''}
  </div>`;
    }

    function renderGearCard(g) {
      const tag = GEAR_TAG_MAP[g.subtipo] || GEAR_TAG_MAP['mundano'];
      return `<div class="item-card anim-fade" data-category="equipamento" data-search="${buildSearchText(g, 'equipamento')}">
    <div class="item-card__top">
      <span class="item-tag item-tag--${tag.css}">${tag.label}</span>
    </div>
    <div class="item-card__name">${g.nome}</div>
    <div class="item-card__stats">
      <span class="stat-badge stat-badge--efeito"><span class="stat-badge__value">${g.efeito}</span></span>
    </div>
    <div class="item-card__meta">
      <span>Alcance: ${g.alcance || '-'}</span>
      <span>${g.peso || '-'}</span>
      <span style="color:var(--gold)">${g.custo || '-'}</span>
    </div>
    ${g.notas ? `<div class="item-card__notes">▸ ${g.notas}</div>` : ''}
  </div>`;
    }

    function renderRules() {
      let html = '';

      // Tabela de Qualidade de Armas
      html += `<div class="budo-section"><div class="budo-section__title">⚔️ Qualidade das Armas</div>
      <div class="reference-table-wrap"><table class="reference-table">
        <thead><tr><th>Qualidade</th><th>Custo</th><th>Efeito no Combate</th><th>Notas</th></tr></thead>
        <tbody>${(window.qualityWeaponDB || []).map(r => `<tr><td>${r.nome}</td><td>${r.custo}</td><td>${r.efeito}</td><td>${r.notas}</td></tr>`).join('')}</tbody>
      </table></div></div>`;

      // Tabela de Qualidade de Armaduras
      html += `<div class="budo-section"><div class="budo-section__title">🛡 Qualidade das Armaduras</div>
      <div class="reference-table-wrap"><table class="reference-table">
        <thead><tr><th>Qualidade</th><th>Custo</th><th>Efeito na Proteção</th><th>Notas</th></tr></thead>
        <tbody>${(window.qualityArmorDB || []).map(r => `<tr><td>${r.nome}</td><td>${r.custo}</td><td>${r.efeito}</td><td>${r.notas}</td></tr>`).join('')}</tbody>
      </table></div></div>`;

      // Tabela de Materiais Especiais
      html += `<div class="budo-section"><div class="budo-section__title">💎 Materiais Especiais</div>
      <div class="reference-table-wrap"><table class="reference-table">
        <thead><tr><th>Material</th><th>Afeta Quem?</th><th>Efeito Mecânico (GURPS)</th></tr></thead>
        <tbody>${(window.materialDB || []).map(r => `<tr><td>${r.nome}</td><td>${r.afeta}</td><td>${r.efeito}</td></tr>`).join('')}</tbody>
      </table></div></div>`;

      // Regra Opcional de Slots
      html += `<div class="budo-section"><div class="budo-section__title">⚖️ Regra Opcional: Carga por Slots</div>
      <div style="font-size:0.85rem; color:var(--text-muted); margin-bottom:10px;">Capacidade = ST. 1 kg = 1 Slot. Itens agrupáveis ocupam espaço reduzido.</div>
      <div class="reference-table-wrap"><table class="reference-table">
        <thead><tr><th>Nível de Carga</th><th>Limite de Slots</th><th>Movimento</th><th>Esquiva</th></tr></thead>
        <tbody>${(window.slotRuleDB || []).map(r => `<tr><td>${r.nivel}</td><td>${r.limites}</td><td>${r.movimento}</td><td><span class="stat-badge" style="border-color:rgba(239, 68, 68, 0.4);"><span class="stat-badge__value" style="color:var(--red-failure);">${r.esquiva}</span></span></td></tr>`).join('')}</tbody>
      </table></div></div>`;

      document.getElementById('grid-regras').innerHTML = html;
    }

    function renderAll() {
      document.getElementById('grid-armas').innerHTML = weaponsDB.map(renderWeaponCard).join('');
      document.getElementById('grid-armaduras').innerHTML = armorDB.map(renderArmorCard).join('');
      document.getElementById('grid-equipamentos').innerHTML = gearDB.map(renderGearCard).join('');
      renderRules();
      updateCounts();
    }


    /* ═══════════════════════════════════════════════════════
       SEARCH ENGINE — Live Filter (no debounce needed)
       ═══════════════════════════════════════════════════════ */

    let activeFilter = 'todos';

    function runFilter() {
      const query = normalize(document.getElementById('search-input').value.trim());
      const cards = document.querySelectorAll('.item-card');
      let visibleArmas = 0, visibleArmaduras = 0, visibleEquip = 0;

      cards.forEach(card => {
        const category = card.dataset.category;
        const searchText = card.dataset.search;

        const matchesCategory = activeFilter === 'todos' || category === activeFilter;
        const matchesQuery = !query || searchText.includes(query);
        const visible = matchesCategory && matchesQuery;

        card.classList.toggle('item-card--hidden', !visible);

        if (visible) {
          if (category === 'arma') visibleArmas++;
          else if (category === 'armadura') visibleArmaduras++;
          else if (category === 'equipamento') visibleEquip++;
        }
      });

      const total = visibleArmas + visibleArmaduras + visibleEquip;
      const showsRegras = (activeFilter === 'todos' || activeFilter === 'regra') && !query;

      // Section visibility
      toggleSection('section-armas', 'grid-armas', visibleArmas);
      toggleSection('section-armaduras', 'grid-armaduras', visibleArmaduras);
      toggleSection('section-equipamentos', 'grid-equipamentos', visibleEquip);

      const secRegras = document.getElementById('section-regras');
      const gridRegras = document.getElementById('grid-regras');
      secRegras.style.display = showsRegras ? '' : 'none';
      gridRegras.style.display = showsRegras ? '' : 'none';

      // Counter
      const counter = document.getElementById('filter-counter');
      if (activeFilter === 'todos' && !query) {
        counter.textContent = `${weaponsDB.length + armorDB.length + gearDB.length} itens`;
      } else if (activeFilter === 'regra') {
        counter.textContent = `4 tabelas de regras`;
      } else {
        counter.textContent = `${total} resultado${total !== 1 ? 's' : ''}`;
      }

      // Empty state
      document.getElementById('empty-state').classList.toggle('visible', total === 0 && !showsRegras);

      // Clear button
      document.getElementById('search-clear').classList.toggle('visible', query.length > 0);

      // Update section counts
      document.getElementById('count-armas').textContent = visibleArmas > 0 ? `(${visibleArmas})` : '';
      document.getElementById('count-armaduras').textContent = visibleArmaduras > 0 ? `(${visibleArmaduras})` : '';
      document.getElementById('count-equipamentos').textContent = visibleEquip > 0 ? `(${visibleEquip})` : '';
    }

    function toggleSection(headerId, gridId, count) {
      const header = document.getElementById(headerId);
      const grid = document.getElementById(gridId);
      const hidden = count === 0;
      header.style.display = hidden ? 'none' : '';
      grid.style.display = hidden ? 'none' : '';
    }

    function updateCounts() {
      document.getElementById('count-armas').textContent = `(${weaponsDB.length})`;
      document.getElementById('count-armaduras').textContent = `(${armorDB.length})`;
      document.getElementById('count-equipamentos').textContent = `(${gearDB.length})`;
      document.getElementById('filter-counter').textContent = `${weaponsDB.length + armorDB.length + gearDB.length} itens`;
    }


    /* ═══════════════════════════════════════════════════════
       EVENT LISTENERS
       ═══════════════════════════════════════════════════════ */

    document.getElementById('search-input').addEventListener('input', runFilter);

    document.getElementById('search-clear').addEventListener('click', () => {
      document.getElementById('search-input').value = '';
      document.getElementById('search-input').focus();
      runFilter();
    });

    document.querySelectorAll('.filter-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('filter-pill--active'));
        pill.classList.add('filter-pill--active');
        activeFilter = pill.dataset.filter;
        runFilter();
      });
    });

    // Keyboard shortcut: Escape to clear search
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        const input = document.getElementById('search-input');
        if (input.value) {
          input.value = '';
          runFilter();
        }
        input.focus();
      }
    });


    /* ═══════════════════════════════════════════════════════
       INIT
       ═══════════════════════════════════════════════════════ */
    renderAll();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('🛡️ PWA: Service Worker registrado com sucesso!'))
          .catch(err => console.error('❌ PWA: Erro ao registrar Service Worker:', err));
      });
    }
  </script>
</body>

</html>
