<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca - Escudo do Daimyo</title>
  <style>
    :root {
      --bg-deep: #0f1115;
      --bg-panel: #1a1d24;
      --border-panel: #2a2e38;
      --gold: #D4A846;
      --gold-dim: rgba(212, 175, 70, 0.2);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --red-accent: #C41E3A;
      --blue-info: #3B82F6;
      --radius-lg: 12px;
      --radius: 6px;
      --font-display: 'Noto Serif JP', serif;
      --font-body: 'Inter', sans-serif;
      --transition: 0.2s ease-out;
      --green-success: #22c55e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); background-color: var(--bg-deep); color: var(--text-primary); line-height: 1.5; font-size: 14px; -webkit-font-smoothing: antialiased; }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--border-panel); border-radius: 3px; }

    .header { background: var(--bg-panel); padding: 10px 20px; border-bottom: 1px solid var(--border-panel); display: flex; align-items: center; justify-content: space-between; }
    .header__title { font-family: var(--font-display); font-size: 1.25rem; font-weight: 700; color: var(--gold); letter-spacing: 0.05em; display: flex; align-items: center; gap: 10px; }
    .header__title span { color: var(--text-primary); }

    .tab-nav { display: flex; gap: 8px; margin-right: auto; margin-left: 30px; }
    .tab-nav__link { text-decoration: none; padding: 6px 12px; border-radius: var(--radius); color: var(--text-muted); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; transition: all var(--transition); border-bottom: 2px solid transparent; }
    .tab-nav__link:hover { color: var(--text-secondary); background: rgba(255,255,255,0.03); }
    .tab-nav__link--active { color: var(--gold); border-bottom: 2px solid var(--gold); }

    .btn-ghost { background: transparent; border: 1px solid var(--border-panel); color: var(--text-secondary); text-decoration: none; padding: 6px 12px; font-size: 0.8rem; font-weight: 600; transition: all var(--transition); border-radius: var(--radius); cursor: pointer; }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

    .library-main { max-width: 1400px; margin: 20px auto; display: grid; grid-template-columns: 280px 1fr; gap: 20px; padding: 0 20px; height: calc(100vh - 120px); overflow: hidden; }

    .sidebar { background: var(--bg-panel); border: 1px solid var(--border-panel); border-radius: var(--radius-lg); padding: 20px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 10px; }
    
    .sidebar__title { font-family: var(--font-display); color: var(--gold); border-bottom: 1px solid var(--gold-dim); padding-bottom: 10px; margin-bottom: 10px; font-size: 1.2rem; }
    
    .cat-btn { background: transparent; border: none; color: var(--text-secondary); text-align: left; font-family: var(--font-body); padding: 10px 12px; border-radius: var(--radius); cursor: pointer; transition: all var(--transition); display: flex; align-items: center; justify-content: space-between; font-weight: 600; font-size: 0.9rem; border: 1px solid transparent; }
    .cat-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
    .cat-btn.active { background: var(--gold-dim); color: var(--gold); border-color: rgba(212, 175, 70, 0.4); }
    .cat-btn__count { font-size: 0.75rem; background: var(--border-panel); padding: 2px 6px; border-radius: 10px; color: var(--text-muted); }

    .content-area { background: var(--bg-panel); border: 1px solid var(--border-panel); border-radius: var(--radius-lg); display: flex; flex-direction: column; overflow: hidden; }
    
    .search-box { padding: 20px; border-bottom: 1px solid var(--border-panel); background: rgba(0,0,0,0.2); }
    .search-input { width: 100%; padding: 14px 20px; font-size: 1.1rem; border-radius: var(--radius); border: 1px solid var(--gold-dim); background: var(--bg-deep); color: var(--text-primary); outline: none; transition: border-color var(--transition); font-family: var(--font-body); }
    .search-input:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(212,175,70,0.1); }
    .search-input::placeholder { color: var(--text-muted); }

    /* SUBCATEGORY CHIPS */
    .sub-chips { display: none; padding: 12px 20px; border-bottom: 1px solid var(--border-panel); background: rgba(0,0,0,0.1); overflow-x: auto; gap: 8px; flex-wrap: wrap; align-items: center; flex-shrink: 0; min-height: 56px; }
    .sub-chips.visible { display: flex; }
    .sub-chip { background: rgba(255,255,255,0.05); border: 1px solid var(--border-panel); color: var(--text-muted); padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all var(--transition); flex-shrink: 0; line-height: 1.4; }
    .sub-chip:hover { border-color: var(--gold-dim); color: var(--text-secondary); }
    .sub-chip.active { background: var(--gold-dim); border-color: rgba(212,175,70,0.4); color: var(--gold); }
    .sub-chips::-webkit-scrollbar { height: 3px; }
    .sub-chips::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 10px; }

    .results-area { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
    
    .lib-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border-panel); border-radius: var(--radius); overflow: hidden; flex-shrink: 0; transition: border-color 0.15s; }
    .lib-card:hover { border-color: rgba(255,255,255,0.1); }
    .lib-card__header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all var(--transition); }
    .lib-card__header:hover { background: rgba(255,255,255,0.05); }
    .lib-card__title { font-family: var(--font-display); font-size: 1.1rem; color: var(--gold); font-weight: 700; display:flex; gap:10px; align-items: center; flex-wrap: wrap; }
    .lib-card__type { font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; font-family: var(--font-body); font-weight: 700; text-transform: uppercase; background: var(--bg-deep); border: 1px solid var(--border-panel); color: #FFF; flex-shrink: 0; }
    
    .tag-vantagem { color: #10b981; border-color: rgba(16,185,129,0.3); }
    .tag-desvantagem { color: var(--red-accent); border-color: rgba(196,30,58,0.3); }
    .tag-pericia { color: var(--blue-info); border-color: rgba(59,130,246,0.3); }
    .tag-budo { color: var(--gold); border-color: var(--gold-dim); }
    .tag-oculto { color: #9f7aea; border-color: rgba(159,122,234,0.3); }
    .tag-item { color: #a0aec0; border-color: rgba(160,174,192,0.3); }
    .tag-regra { color: #f59e0b; border-color: rgba(245,158,11,0.3); }
    .tag-arquetipo { color: #ec4899; border-color: rgba(236,72,153,0.3); }
    .tag-atlas { color: #06b6d4; border-color: rgba(6,182,212,0.3); }
    .tag-yokai { color: #ef4444; border-color: rgba(239,68,68,0.3); }
    .tag-peculiaridade { color: #a78bfa; border-color: rgba(167,139,250,0.3); }
    .tag-casa { color: #8b5cf6; border-color: rgba(139, 92, 246, 0.3); }

    .lib-card__cost { font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .lib-card__fonte { font-size: 0.65rem; padding: 2px 6px; border-radius: 3px; background: rgba(59,130,246,0.1); color: rgba(59,130,246,0.7); border: 1px solid rgba(59,130,246,0.2); font-weight: 700; white-space: nowrap; }

    .lib-card__body { padding: 0 20px 20px 20px; color: var(--text-secondary); font-size: 0.95rem; line-height: 1.6; display: none; border-top: 1px dashed rgba(255,255,255,0.1); margin-top: 10px; padding-top: 15px; }
    .lib-card__body b { color: var(--gold); }
    .lib-card__body i { color: var(--text-primary); font-style: italic; opacity: 0.9; }
    
    .lib-card__body ul, .lib-card__body ol { margin: 8px 0; padding-left: 20px; }
    .lib-card__body li { margin-bottom: 6px; position: relative; list-style: none; }
    .lib-card__body ul li::before { content: '•'; color: var(--gold); position: absolute; left: -15px; font-weight: 900; }
    .lib-card__body ol { list-style: decimal; }
    .lib-card__body ol li::marker { color: var(--gold); font-weight: 700; }

    .md-line { margin-bottom: 4px; }
    .md-spacer { height: 12px; }
    
    .md-code { font-family: monospace; background: rgba(0,0,0,0.3); padding: 2px 5px; border-radius: 3px; color: #BBB; border: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
    .md-ref { font-size: 0.7rem; font-weight: 700; color: var(--gold); background: rgba(212, 175, 70, 0.1); border: 1px solid var(--gold-dim); padding: 1px 4px; border-radius: 3px; margin: 0 2px; vertical-align: middle; text-transform: uppercase; letter-spacing: 0.03em; }

    .lib-card.expanded .lib-card__body { display: block; }
    .lib-card.expanded .lib-card__header { background: rgba(0,0,0,0.2); }

    /* MD TABLE */
    .md-table-wrap { width: 100%; overflow-x: auto; margin: 8px 0; -webkit-overflow-scrolling: touch; }
    .md-table { width: 100%; border-collapse: collapse; min-width: 400px; font-size: 0.85rem; }
    .md-table th { text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border-panel); color: var(--gold); background: rgba(0,0,0,0.2); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
    .md-table td { padding: 6px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text-secondary); }
    .md-table tr:hover td { background: rgba(255,255,255,0.03); }

    /* BUDÔ CARD SPECIAL */
    .budo-section { margin-top: 4px; }
    .budo-section__title { font-size: 0.7rem; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .budo-pericias { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
    .budo-pericia-badge { font-size: 0.72rem; padding: 2px 8px; border-radius: 12px; background: rgba(59,130,246,0.1); color: rgba(59,130,246,0.8); border: 1px solid rgba(59,130,246,0.2); font-weight: 600; }
    .budo-table-wrap { width: 100%; overflow-x: auto; margin-bottom: 6px; -webkit-overflow-scrolling: touch; }
    .budo-tecnicas { width: 100%; border-collapse: collapse; min-width: 420px; }
    .budo-tecnicas th { text-align: left; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; padding: 4px 8px; border-bottom: 1px solid var(--border-panel); white-space: nowrap; }
    .budo-tecnicas td { font-size: 0.82rem; padding: 4px 8px; border-bottom: 1px solid rgba(255,255,255,0.03); color: var(--text-secondary); vertical-align: top; }
    .budo-tecnicas td:first-child { color: var(--text-primary); font-weight: 600; white-space: normal; min-width: 100px; line-height: 1.3; }
    .budo-tecnicas tr:hover td { background: rgba(255,255,255,0.02); }
    .budo-qual { font-size: 0.85rem; padding: 2px 0; }
    .budo-qual__name { color: var(--gold); font-weight: 600; }
    .budo-qual__desc { color: var(--text-muted); margin-left: 4px; }

    .empty-msg { text-align: center; color: var(--text-muted); padding: 40px; font-size: 1.1rem; }

    @media (max-width: 600px) {
      body { font-size: 13px; }
      .header__title { font-size: 1rem; }
      .library-main { margin: 10px auto; padding: 0 10px; gap: 10px; }
      .search-box { padding: 15px; }
      .search-input { padding: 10px 15px; font-size: 0.95rem; }
      .lib-card__header { padding: 12px 15px; flex-wrap: wrap; gap: 8px; }
      .lib-card__title { font-size: 0.95rem; gap: 6px; }
      .lib-card__type { font-size: 0.65rem; padding: 2px 6px; }
      .lib-card__cost { font-size: 0.75rem; gap: 3px; }
      .lib-card__body { font-size: 0.85rem; padding: 0 15px 15px; }
      .tag-mini { display: none !important; }
      .sub-chips { padding: 8px 12px; gap: 6px; flex-wrap: nowrap; overflow-x: auto; }
      .sub-chip { padding: 5px 12px; font-size: 0.72rem; }

      /* Budô mobile: tabela como cards empilhados */
      .budo-tecnicas { min-width: unset; }
      .budo-tecnicas thead { display: none; }
      .budo-tecnicas tr { display: flex; flex-direction: column; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); gap: 2px; }
      .budo-tecnicas td { padding: 1px 0; font-size: 0.8rem; border: none; }
      .budo-tecnicas td:first-child { font-size: 0.85rem; color: var(--text-primary); }
      .budo-tecnicas td:nth-child(2)::before { content: 'Dif: '; color: var(--text-muted); font-size: 0.7rem; }
      .budo-tecnicas td:nth-child(3)::before { content: 'Base: '; color: var(--text-muted); font-size: 0.7rem; }
      .budo-tecnicas td:last-child { color: var(--text-muted); font-size: 0.75rem; }
      .budo-table-wrap { overflow-x: visible; }
    }

    @media (max-width: 900px) {
      .header { flex-direction: column; align-items: flex-start; gap: 10px; padding: 10px; }
      .header__meta { display: none; }
      .tab-nav { margin: 0; width: 100%; flex-wrap: wrap; justify-content: center; }
      .library-main { grid-template-columns: 1fr; height: auto; display: flex; flex-direction: column; overflow-y: visible; }
      .sidebar { flex-direction: row; flex-wrap: nowrap; overflow-x: auto; height: auto; padding: 10px; border-radius: 0; margin-bottom: 10px; border-left: none; border-right: none; }
      .sidebar__title { display: none; }
      .cat-btn { flex: 0 0 auto; min-width: max-content; justify-content: center; padding: 8px 16px; font-size: 0.85rem; }
      .cat-btn__count { display: inline-block; }
      .content-area { border-radius: 0; border-left: none; border-right: none; flex: 1; min-height: 70vh; }
      .results-area { padding: 10px; }
    }
  </style>
  <link rel="icon" type="image/png" href="icons/app-icon-192.png">
  
  <!-- CORE INFRASTRUCTURE (Explicit Loading) -->
  <script src="js/daimyo-db.js"></script>
<script src="shared/daimyo-theme-contract.js"></script>
<script src="js/theme-manager.js"></script>
  <script src="js/log-manager.js"></script>
  <script src="js/daimyo-seal.js"></script>
  <script src="js/header-loader.js"></script>
  <script>
    if (localStorage.getItem('daimyo_auth') !== 'true') { window.location.href = 'index.html'; }
    if (window.DaimyoDB) {
      window.DaimyoDB.init().then(() => {
        window.DaimyoDB.migrateFromLocalStorage();
        console.log("⛩️ Porta do Daimyo: Banco de dados e migrações ativos.");
      }).catch(err => console.error("Falha na inicialização do Cofre:", err));
    }
  </script>
</head>
<body>

  <div id="daimyo-header"></div>

  <main class="library-main">
    
    <aside class="sidebar" id="sidebar-cats">
      <h2 class="sidebar__title">Categorias</h2>
    </aside>

    <section class="content-area">
      <div class="search-box">
        <input type="text" id="input-search" class="search-input" placeholder="Buscar por Nome, Efeito, Técnica ou Custo... (Ex: Kenjutsu, Contra-Ataque, -15)" aria-label="Buscar na biblioteca">
      </div>
      <div class="sub-chips" id="sub-chips"></div>
      <div class="results-area" id="results-area"></div>
    </section>

  </main>

  <!-- MODAL: ADD ITEM -->
  <div id="modal-add-item" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:var(--bg-panel); padding:30px; border-radius:var(--radius-lg); width:95%; max-width:600px; border:1px solid var(--gold); box-shadow:0 0 30px rgba(212,168,70,0.2);">
      <h2 style="font-family:var(--font-display); color:var(--gold); margin-bottom:20px; border-bottom:1px solid var(--gold-dim); padding-bottom:10px;">🆕 Adicionar Conteúdo</h2>
      <div style="display:grid; gap:15px;">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
          <div>
            <label style="font-size:0.75rem; color:var(--text-muted); font-weight:700; text-transform:uppercase;">Nome</label>
            <input type="text" id="lib-new-name" class="search-input" style="padding:10px; font-size:0.9rem;" placeholder="Ex: Grito de Batalha">
          </div>
          <div>
            <label style="font-size:0.75rem; color:var(--text-muted); font-weight:700; text-transform:uppercase;">Categoria</label>
            <select id="lib-new-cat" class="search-input" style="padding:10px; font-size:0.9rem;"></select>
          </div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
          <div>
            <label style="font-size:0.75rem; color:var(--text-muted); font-weight:700; text-transform:uppercase;">Custo / Tipo</label>
            <input type="text" id="lib-new-cust" class="search-input" style="padding:10px; font-size:0.9rem;" placeholder="Ex: 5 pts, Estilo, Elite">
          </div>
          <div>
            <label style="font-size:0.75rem; color:var(--text-muted); font-weight:700; text-transform:uppercase;">Tags (Separe por vírgula)</label>
            <input type="text" id="lib-new-tags" class="search-input" style="padding:10px; font-size:0.9rem;" placeholder="Ex: Combate, Social">
          </div>
        </div>
        <div>
          <label style="font-size:0.75rem; color:var(--text-muted); font-weight:700; text-transform:uppercase;">Descrição / Efeito</label>
          <textarea id="lib-new-desc" class="search-input" style="padding:10px; font-size:0.9rem; min-height:100px; resize:vertical;" placeholder="Descreva o conteúdo..."></textarea>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:10px;">
          <button class="btn-ghost" onclick="toggleModal('modal-add-item', false)">Cancelar</button>
          <button class="btn-ghost" style="background:var(--gold); color:#000; border-color:var(--gold);" onclick="saveNewItem()">Salvar Registro</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL: MANAGE CATEGORIES -->
  <div id="modal-manage-cats" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:var(--bg-panel); padding:30px; border-radius:var(--radius-lg); width:95%; max-width:500px; border:1px solid var(--gold); box-shadow:0 0 30px rgba(0,0,0,0.5); display:flex; flex-direction:column; max-height:80vh;">
      <h2 style="font-family:var(--font-display); color:var(--gold); margin-bottom:20px; border-bottom:1px solid var(--gold-dim); padding-bottom:10px;">⚙️ Gerenciar Categorias</h2>
      <div id="cats-editor-list" style="overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:8px; margin-bottom:20px;"></div>
      <div style="display:flex; gap:10px; border-top:1px solid var(--border-panel); padding-top:15px;">
        <input type="text" id="cat-new-name" class="search-input" placeholder="Nova Categoria" style="padding:8px; font-size:0.8rem; flex:1;">
        <button class="btn-ghost" style="background:var(--gold); color:#000; border-color:var(--gold); padding:8px 15px;" onclick="addNewCategory()">Adicionar</button>
      </div>
      <div style="display:flex; justify-content:flex-end; margin-top:20px;">
        <button class="btn-ghost" onclick="toggleModal('modal-manage-cats', false)">Fechar</button>
      </div>
    </div>
  </div>

  <div style="position:fixed; bottom:30px; right:30px; display:flex; flex-direction:column; gap:10px;">
    <button class="btn-ghost" style="background:var(--gold); color:#000; border-color:var(--gold); font-size:1.2rem; width:50px; height:50px; border-radius:25px; box-shadow:0 4px 15px rgba(0,0,0,0.5);" title="Adicionar Novo Item" onclick="toggleModal('modal-add-item', true)">＋</button>
    <button class="btn-ghost" style="background:var(--bg-panel); font-size:1.2rem; width:50px; height:50px; border-radius:25px; box-shadow:0 4px 15px rgba(0,0,0,0.5);" title="Gerenciar Categorias" onclick="openCatManager()">⚙️</button>
  </div>

  <script src="js/library-data.js"></script>
  <script>
    const container = document.getElementById('results-area');
    const searchInput = document.getElementById('input-search');
    const subChipsBar = document.getElementById('sub-chips');
    let currentCategory = 'all';
    let currentSub = 'all';

    const catMap = {
      'Vantagem': 'tag-vantagem', 'Desvantagem': 'tag-desvantagem', 'Perícia': 'tag-pericia',
      'Pericia': 'tag-pericia', 'Budo': 'tag-budo', 'Yokai': 'tag-yokai',
      'Arquétipo': 'tag-arquetipo', 'Atlas': 'tag-atlas', 'Alquimia': 'tag-item',
      'Regra': 'tag-regra', 'Qualidade': 'tag-item', 'Peculiaridade': 'tag-peculiaridade'
    };

    function renderAll() {
        renderCategories();
        renderSubChips();
        renderLibrary();
    }

    function init() {
      console.log("📚 Library UI: Inicializando listeners...");
      searchInput.addEventListener('input', renderLibrary);
      
      // Se o manager já estiver pronto (ex: carregamento estático e scripts já rodaram), renderiza.
      // Senão, o daimyoLibraryReady cuidará disso.
      if (LibraryManager.isReady()) {
          console.log("📚 Library UI: Manager detectado como pronto no boot.");
          renderAll();
      }
    }

    // Reactive listener para o Cofre Infinito
    window.addEventListener('daimyoLibraryReady', () => {
        console.log("📚 Library UI: Sinal de Vault recebido, renderizando conteúdo final.");
        renderAll();
    });
    
    window.addEventListener('daimyoStateUpdated', () => {
        console.log("📚 Library UI: Estado do Cofre atualizado.");
        renderAll();
    });

    document.addEventListener('DOMContentLoaded', init);

    function renderCategories() {
      const sidebar = document.getElementById('sidebar-cats');
      const cats = LibraryManager.getCategories();
      const allItems = LibraryManager.getItems();

      let html = `<h2 class="sidebar__title">Categorias</h2>
        <button class="cat-btn ${currentCategory === 'all' ? 'active' : ''}" onclick="selectCat('all')">
          📚 Ver Tudo <span class="cat-btn__count">${allItems.length}</span>
        </button>`;

      cats.forEach(c => {
        const count = allItems.filter(i => i.cat === c.name).length;
        if (count === 0) return;
        html += `<button class="cat-btn ${currentCategory === c.name ? 'active' : ''}" onclick="selectCat('${c.name}')">
            ${c.icon || '🔹'} ${c.name} <span class="cat-btn__count">${count}</span>
          </button>`;
      });
      sidebar.innerHTML = html;

      const select = document.getElementById('lib-new-cat');
      select.innerHTML = cats.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
    }

    function renderSubChips() {
      if (currentCategory === 'all') {
        subChipsBar.className = 'sub-chips';
        subChipsBar.innerHTML = '';
        return;
      }
      const allItems = LibraryManager.getItems();
      const subs = [...new Set(allItems.filter(i => i.cat === currentCategory && i.sub).map(i => i.sub))];
      
      if (subs.length <= 1) {
        subChipsBar.className = 'sub-chips';
        subChipsBar.innerHTML = '';
        return;
      }

      const counts = {};
      subs.forEach(s => { counts[s] = allItems.filter(i => i.cat === currentCategory && i.sub === s).length; });
      const totalCat = allItems.filter(i => i.cat === currentCategory).length;

      let html = `<button class="sub-chip ${currentSub === 'all' ? 'active' : ''}" onclick="selectSub('all')">Tudo (${totalCat})</button>`;
      subs.forEach(s => {
        html += `<button class="sub-chip ${currentSub === s ? 'active' : ''}" onclick="selectSub('${s}')">${s} (${counts[s]})</button>`;
      });
      subChipsBar.innerHTML = html;
      subChipsBar.className = 'sub-chips visible';
    }

    function selectCat(cat) {
      currentCategory = cat;
      currentSub = 'all';
      renderCategories();
      renderSubChips();
      renderLibrary();
    }

    function selectSub(sub) {
      currentSub = sub;
      renderSubChips();
      renderLibrary();
    }

    function matchesSearch(item, term) {
      if (!term) return true;
      const fields = [item.nome, item.desc, item.cust, item.cat, item.sub || '', item.conceito || ''];
      if (item.tags) fields.push(...item.tags);
      if (item.fonte) fields.push(item.fonte);
      // Connected search: search inside Budô técnicas and qualidades
      if (item.tecnicas) {
        item.tecnicas.forEach(t => { fields.push(t.nome, t.desc, t.dificuldade); });
      }
      if (item.qualidades_estilo) {
        item.qualidades_estilo.forEach(q => { fields.push(q.nome, q.desc); });
      }
      if (item.pericias_realistas) {
        fields.push(...item.pericias_realistas);
      }
      return fields.some(f => f && f.toLowerCase().includes(term));
    }

    function renderLibrary() {
      const term = searchInput.value.toLowerCase();
      const allItems = LibraryManager.getItems();
      
      const filtered = allItems.filter(item => {
        const matchCat = (currentCategory === 'all' || item.cat === currentCategory);
        const matchSubCat = (currentSub === 'all' || item.sub === currentSub);
        return matchCat && matchSubCat && matchesSearch(item, term);
      });

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-msg">Nenhum registro encontrado para "${searchInput.value || 'esta categoria'}".</div>`;
        return;
      }

      container.innerHTML = filtered.map(item => {
        if (item.cat === 'Budo' && item.tecnicas) return renderBudoCard(item);
        return renderStandardCard(item);
      }).join('');
    }

    function escapeHtml(text) {
      if (!text) return "";
      const map = {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#039;'
      };
      return text.toString().replace(/[&<>"']/g, function (m) { return map[m]; });
    }

    function parseLibraryDescription(text) {
      if (!text) return '';
      
      // Sanitização básica antes de processar MD
      let escaped = escapeHtml(text);
      
      // Normalize: replace \\n with \n and <br> with \n
      let content = escaped.replace(/\\n/g, '\n').replace(/&lt;br\s*\/?&gt;/gi, '\n');
      
      const lines = content.split('\n');
      let html = '';
      let inTable = false;
      let inList = false;
      let listType = null; // 'ul' or 'ol'
      
      for (let i = 0; i < lines.length; i++) {
        let line = lines[i].trim();
        if (!line && !inTable && !inList) {
          html += '<div class="md-spacer"></div>';
          continue;
        }

        // --- TABLE DETECTION ---
        let isSeparator = line.includes('-') && /^\|?[\s\-:]+\|?([\s\-:]+\|?)*$/.test(line);
        let isRow = line.includes('|') && line.split('|').length > 1;

        if (isSeparator) continue;

        if (!inTable && isRow) {
          if (inList) { html += `</${listType}>`; inList = false; }
          inTable = true;
          html += '<div class="md-table-wrap"><table class="md-table"><thead>';
          let cells = line.split('|');
          if (cells[0].trim() === '') cells.shift();
          if (cells.length > 0 && cells[cells.length-1].trim() === '') cells.pop();
          html += '<tr>' + cells.map(c => `<th>${parseInlineMarkdown(c)}</th>`).join('') + '</tr></thead><tbody>';
          continue;
        }

        if (inTable) {
          if (isRow) {
            let cells = line.split('|');
            if (cells[0].trim() === '') cells.shift();
            if (cells.length > 0 && cells[cells.length-1].trim() === '') cells.pop();
            html += '<tr>' + cells.map(c => `<td>${parseInlineMarkdown(c)}</td>`).join('') + '</tr>';
            continue;
          } else {
            html += '</tbody></table></div>';
            inTable = false;
          }
        }

        // --- LIST DETECTION ---
        const ulMatch = line.match(/^([•\-\*])\s+(.*)/);
        const olMatch = line.match(/^(\d+[\.\)])\s+(.*)/);
        
        if (ulMatch || olMatch) {
          const currentType = ulMatch ? 'ul' : 'ol';
          const lineContent = ulMatch ? ulMatch[2] : olMatch[2];
          
          if (!inList) {
            inList = true;
            listType = currentType;
            html += `<${listType}>`;
          } else if (listType !== currentType) {
            html += `</${listType}><${currentType}>`;
            listType = currentType;
          }
          
          html += `<li>${parseInlineMarkdown(lineContent)}</li>`;
          continue;
        } else if (inList) {
          html += `</${listType}>`;
          inList = false;
        }

        // --- REGULAR LINE ---
        if (line) {
          html += `<div class="md-line">${parseInlineMarkdown(line)}</div>`;
        }
      }
      
      if (inTable) html += '</tbody></table></div>';
      if (inList) html += `</${listType}>`;
      
      return html;
    }

    function parseInlineMarkdown(text) {
      if (!text) return '';
      return text.trim()
        .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
        .replace(/\*(.*?)\*/g, '<i>$1</i>')
        .replace(/`([^`]+)`/g, '<code class="md-code">$1</code>')
        .replace(/\[([^\]]+)\]/g, '<span class="md-ref">$1</span>');
    }

    function renderStandardCard(item) {
      const tagClass = catMap[item.cat] || 'tag-regra';
      const tagsHtml = (item.tags || []).map(t => `<span class="tag-mini" style="font-size:0.6rem; background:rgba(255,255,255,0.05); padding:2px 6px; border-radius:3px; color:var(--text-muted); border:1px solid var(--border-panel); margin-right:4px; white-space:nowrap;">${t}</span>`).join('');
      const fonteHtml = item.fonte ? `<span class="lib-card__fonte">${item.fonte}</span>` : '';
      const subHtml = item.sub ? `<span style="font-size:0.65rem; color:var(--text-muted); font-weight:400;">${item.sub}</span>` : '';
      const descParsed = parseLibraryDescription(item.desc);


      return `
      <div class="lib-card">
        <div class="lib-card__header" onclick="this.parentElement.classList.toggle('expanded')">
          <div class="lib-card__title">
            <span class="lib-card__type ${tagClass}">${item.cat}</span> 
            ${item.nome}
            ${subHtml}
            <div style="margin-left:5px; display:flex;">${tagsHtml}</div>
          </div>
          <div style="display:flex; align-items:center; gap:10px;">
            ${fonteHtml}
            <div class="lib-card__cost">${item.cust}</div>
            <button class="btn-ghost btn-sm" onclick="event.stopPropagation(); deleteLibItem('${item.id}')" style="border:none; color:var(--text-muted); padding:4px;">🗑️</button>
            <span style="font-size:1.2rem; transition:transform 0.2s;">＋</span>
          </div>
        </div>
        <div class="lib-card__body">${descParsed}</div>
      </div>`;
    }

    function renderBudoCard(item) {
      const fonteHtml = item.fonte ? `<span class="lib-card__fonte">${item.fonte}</span>` : '';
      const emoji = item.emoji || '⚔️';

      const periciasHtml = (item.pericias_realistas || []).map(p => `<span class="budo-pericia-badge">${p}</span>`).join('');

      let tecnicasHtml = '';
      if (item.tecnicas && item.tecnicas.length) {
        tecnicasHtml = `<div class="budo-table-wrap"><table class="budo-tecnicas">
          <thead><tr><th>Técnica</th><th>Dif.</th><th>Base</th><th>Efeito</th></tr></thead>
          <tbody>${item.tecnicas.map(t => `<tr><td>${t.nome}</td><td>${t.dificuldade}</td><td>${t.base}</td><td>${t.desc}</td></tr>`).join('')}</tbody>
        </table></div>`;
      }

      let qualsHtml = '';
      if (item.qualidades_estilo && item.qualidades_estilo.length) {
        qualsHtml = item.qualidades_estilo.map(q => `<div class="budo-qual"><span class="budo-qual__name">• ${q.nome}:</span><span class="budo-qual__desc"> ${q.desc}</span></div>`).join('');
      }

      return `
      <div class="lib-card">
        <div class="lib-card__header" onclick="this.parentElement.classList.toggle('expanded')">
          <div class="lib-card__title">
            <span class="lib-card__type tag-budo">BUDÔ</span>
            <span style="font-size:1.3rem;">${emoji}</span>
            ${item.nome}
          </div>
          <div style="display:flex; align-items:center; gap:10px;">
            ${fonteHtml}
            <div class="lib-card__cost">${item.cust}</div>
            <span style="font-size:1.2rem; transition:transform 0.2s;">＋</span>
          </div>
        </div>
        <div class="lib-card__body">
          <div style="margin-bottom:8px; color:var(--text-primary); font-style:italic; font-size:0.9rem;">${(item.conceito || item.desc || '').replace(/\n/g, '<br>')}</div>
          
          <div class="budo-section">
            <div class="budo-section__title">🥋 Perícias Realistas</div>
            <div class="budo-pericias">${periciasHtml}</div>
          </div>

          <div class="budo-section">
            <div class="budo-section__title">⚔️ Técnicas</div>
            ${tecnicasHtml}
          </div>

          <div class="budo-section">
            <div class="budo-section__title">🎭 Qualidades do Estilo (1 pt cada)</div>
            ${qualsHtml}
          </div>
        </div>
      </div>`;
    }

    // --- MODAL HELPERS ---
    function toggleModal(id, show) {
      document.getElementById(id).style.display = show ? 'flex' : 'none';
    }

    function saveNewItem() {
      const name = document.getElementById('lib-new-name').value;
      const cat = document.getElementById('lib-new-cat').value;
      const cust = document.getElementById('lib-new-cust').value;
      const tagsRaw = document.getElementById('lib-new-tags').value;
      const desc = document.getElementById('lib-new-desc').value;
      if (!name || !desc) return alert('Pelo menos Nome e Descrição são obrigatórios.');
      const tags = tagsRaw.split(',').map(t => t.trim()).filter(t => t !== '');
      LibraryManager.addItem({ nome: name, cat: cat, cust: cust, desc: desc, tags: tags });
      document.getElementById('lib-new-name').value = '';
      document.getElementById('lib-new-tags').value = '';
      document.getElementById('lib-new-desc').value = '';
      toggleModal('modal-add-item', false);
      renderAll();
    }

    function deleteLibItem(id) {
      if (!confirm('Deseja excluir este item permanentemente?')) return;
      LibraryManager.removeItem(id);
      renderAll();
    }

    function openCatManager() {
      renderCatManagerList();
      toggleModal('modal-manage-cats', true);
    }

    function renderCatManagerList() {
      const list = document.getElementById('cats-editor-list');
      const cats = LibraryManager.getCategories();
      list.innerHTML = cats.map(c => `
        <div style="display:flex; align-items:center; gap:10px; padding:10px; background:rgba(255,255,255,0.03); border-radius:var(--radius); border:1px solid var(--border-panel);">
          <span style="font-size:1rem; min-width:25px;">${c.icon || '🔹'}</span>
          <span style="flex:1; font-weight:700; color:var(--gold);">${c.name}</span>
          <div style="display:flex; gap:4px;">
            <button class="btn-ghost btn-sm" onclick="LibraryManager.reorderCategory('${c.id}', -1); renderCatManagerList(); renderAll();">↑</button>
            <button class="btn-ghost btn-sm" onclick="LibraryManager.reorderCategory('${c.id}', 1); renderCatManagerList(); renderAll();">↓</button>
            <button class="btn-ghost btn-sm" onclick="if(confirm('Apagar categoria?')) { LibraryManager.removeCategory('${c.id}'); renderCatManagerList(); renderAll(); }" style="color:var(--red-accent);">✕</button>
          </div>
        </div>
      `).join('');
    }

    function addNewCategory() {
      const name = document.getElementById('cat-new-name').value;
      if (!name) return;
      LibraryManager.addCategory({ name: name, icon: '🔹', tags: [] });
      document.getElementById('cat-new-name').value = '';
      renderCatManagerList();
      renderAll();
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('🛡️ PWA: Service Worker registrado com sucesso!'))
          .catch(err => console.error('❌ PWA: Erro ao registrar Service Worker:', err));
      });
    }
  </script>
</body>
