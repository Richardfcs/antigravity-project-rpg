<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santuário de Heróis — A Era das Espadas Quebradas</title>
    <meta name="description" content="Portão de entrada para o sistema Escudo do Daimyo. Escolha seu caminho.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icons/app-icon-192.png">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('🛡️ Daimyo Shield: PWA Ativo.'))
                    .catch(err => console.error('❌ PWA Error:', err));
            });
        }
    </script>
    
    <style>
        :root {
            --bg: #050505;
            --gold: #D4A846;
            --red: #C41E3A;
            --text: #F5F0E8;
            --font-display: 'Noto Serif JP', serif;
            --font-body: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Ambient Background */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(139, 0, 0, 0.1) 0%, transparent 70%),
                radial-gradient(circle at 80% 20%, rgba(212, 168, 70, 0.05) 0%, transparent 40%);
            z-index: 1;
        }

        .portal {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px;
            max-width: 500px;
            width: 90%;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            animation: fadeIn 2s ease;
        }

        .logo span { color: var(--red); }

        .subtitle {
            font-size: 0.9rem;
            color: #9CA3AF;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 60px;
            font-weight: 500;
            animation: fadeIn 3s ease;
        }

        .btn-enter {
            display: block;
            background: linear-gradient(135deg, #8B6914, var(--gold));
            color: #1a1a1a;
            text-decoration: none;
            padding: 20px 40px;
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 900;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(212, 168, 70, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            animation: slideUp 1s ease;
        }

        .btn-enter:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(212, 168, 70, 0.4);
            filter: brightness(1.1);
        }

        .btn-enter:active { transform: translateY(0); }

        /* Master Access (Discrete) */
        .master-trigger {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            font-size: 1.2rem;
            opacity: 0.3;
            transition: all 0.5s;
            filter: grayscale(1);
        }

        .master-trigger:hover {
            opacity: 1;
            background: rgba(139, 0, 0, 0.1);
            border-color: var(--red);
            filter: grayscale(0);
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal.open { display: flex; animation: fadeIn 0.3s ease; }

        .modal-content {
            background: #121212;
            border: 1px solid #333;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .modal-title {
            font-family: var(--font-display);
            font-size: 1rem;
            margin-bottom: 20px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .input-code {
            width: 100%;
            background: #000;
            border: 1px solid #444;
            padding: 12px;
            color: white;
            text-align: center;
            font-family: monospace;
            font-size: 1.2rem;
            margin-bottom: 20px;
            outline: none;
            border-radius: 4px;
        }

        .input-code:focus { border-color: var(--gold); }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .btn-modal {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .btn-auth { background: var(--red); color: white; }
        .btn-close { background: #333; color: #999; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Torch effect */
        .torch {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--gold);
            box-shadow: 0 0 100px 50px rgba(212, 168, 70, 0.1);
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="torch" id="torch"></div>

    <main class="portal">
        <h1 class="logo">Escudo do <span>Daimyo</span></h1>
        <p class="subtitle">Santuário de Heróis</p>
        
        <a href="Jogadores/index.html" class="btn-enter" id="btn-player">Entrar no Santuário</a>
    </main>

    <div class="master-trigger" id="master-trigger" title="Acesso do Daimyo">⛩️</div>

    <div class="modal" id="login-modal">
        <div class="modal-content">
            <h2 class="modal-title">Selo de Identidade</h2>
            <input type="password" id="pass-input" class="input-code" placeholder="Senha do Mestre">
            <div class="modal-actions">
                <button class="btn-modal btn-close" id="btn-modal-close">Fechar</button>
                <button class="btn-modal btn-auth" id="btn-modal-auth">Autenticar</button>
            </div>
        </div>
    </div>

    <script>
        // Mouse torch effect
        const torch = document.getElementById('torch');
        document.addEventListener('mousemove', (e) => {
            torch.style.left = e.clientX + 'px';
            torch.style.top = e.clientY + 'px';
        });

        // Modal triggers
        const trigger = document.getElementById('master-trigger');
        const modal = document.getElementById('login-modal');
        const closeBtn = document.getElementById('btn-modal-close');
        const authBtn = document.getElementById('btn-modal-auth');
        const passInput = document.getElementById('pass-input');

        trigger.addEventListener('click', () => {
            modal.classList.add('open');
            passInput.focus();
        });

        closeBtn.addEventListener('click', () => {
            modal.classList.remove('open');
            passInput.value = '';
        });

        modal.addEventListener('click', (e) => {
            if(e.target === modal) {
                modal.classList.remove('open');
                passInput.value = '';
            }
        });

        async function authenticate() {
            const val = passInput.value;
            if(!val) return;
            
            // Password checked directly as requested for simplicity
            if(val === '2005rd') {
                localStorage.setItem('daimyo_auth', 'true');
                window.location.href = 'master-hub.html';
            } else {
                passInput.style.borderColor = 'red';
                passInput.value = '';
                passInput.placeholder = "Senha Inválida";
                setTimeout(() => {
                    passInput.style.borderColor = '#444';
                    passInput.placeholder = "Senha do Mestre";
                }, 1000);
            }
        }

        authBtn.addEventListener('click', authenticate);
        passInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') authenticate();
        });
    </script>
</body>
</html>
